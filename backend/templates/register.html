<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>

<div class="container">
    <h2 id="form-title">Registration</h2>

    <input type="text" id="first_name" placeholder="First Name" required>
    <input type="text" id="last_name" placeholder="Last Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <input type="password" id="confirm_password" placeholder="Confirm Password" required>   

    <button id="submit-btn" onclick="register()">Register Now</button>

    <p id="msg"></p>

    <p class="small-link">
        Already have an account? <a href="/login">Login here</a>
    </p>
</div>

<script>
    async function register() {
        const msg = document.getElementById("msg");
        const firstName = document.getElementById("first_name").value;
        const lastName = document.getElementById("last_name").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirm_password").value;

        if(password !== confirmPassword){
            msg.innerText = "Passwords do not match!";
            msg.style.color = "red";
            return;
        }
        // Backend ko batane ke liye ke ye Admin hai ya User
        let targetRoute = "/auth/register";
        if (window.location.pathname.includes("admin-register")) {
            targetRoute = "/auth/admin-register";
        }

        try {
            const res = await fetch(targetRoute, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    first_name: firstName,
                    last_name: lastName,
                    email: email,
                    password: password
                })
            });

            const data = await res.json();

            if(!res.ok){
                msg.innerText = data.error || "Registration failed";
                msg.style.color = "red";
            } else {
                msg.innerText = "✅ Registered successfully! Redirecting...";
                msg.style.color = "green";
                
                setTimeout(() => { 
                    window.location.href = "/login"; 
                }, 1500);
            }
        } catch (err) {
            msg.innerText = "Connection error!";
            msg.style.color = "red";
        }
    }
</script>

</body>
</html>
