<!DOCTYPE html>
<html>
<head>
    <title>Manage Users</title>
    <link rel="stylesheet" href="/static/css/admin_dashboard.css">
</head>
<body>

<div class="header">
    <h2>All Users</h2>
    
</div>

<section>
    <table id="users-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="users-body">
            <tr><td colspan="4">Loading...</td></tr>
        </tbody>
    </table>
</section>

<!-- EDIT USER MODAL (START HIDDEN) -->
<div id="edit-user-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close" onclick="closeEditModal()">&times;</span>
        <h3>Edit User</h3>

        <input type="hidden" id="edit_user_id">
        <input type="text" id="edit_first_name" placeholder="First Name">
        <input type="text" id="edit_last_name" placeholder="Last Name">
        <input type="email" id="edit_email" placeholder="Email">
        
        <input type="text" id="edit_role" value="user" readonly style="background:#f0f0f0; cursor:not-allowed;">

        <br><br>
        <button class="edit-btn" onclick="updateUser()">update</button>
    </div>
</div>

    

<script src="/static/js/admin_users.js"></script>
</body>
</html>
